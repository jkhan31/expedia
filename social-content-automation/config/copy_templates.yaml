# Social Copy Templates
# Platform-specific templates for AI-generated copy

copy_templates:

  linkedin:
    hook: "🔍 {insight_headline}"
    structure:
      - "Hook (question or bold statement)"
      - "Data/Finding (key metric)"
      - "Insight (implication)"
      - "CTA (engage or read full case study)"
    hooks:
      - "{insight}"
      - "Here's what most people get wrong about {title}"
      - "You'd assume {common_belief}. The data says otherwise."
      - "Why does {insight}? Here's what I found."
      - "{insight} Here's why."
    example: |
      Luxury hotels book 27% less on Expedia. But price isn't the problem.

      📊 Luxury: 2.20% booking rate | Budget: 3.04%

      After analyzing 100k searches, the real culprit is quality expectation misalignment. Luxury buyers expect 4.30★ hotels but get 4.20★. That gap kills conversions.

      Read the full analysis → {link}

    tone_notes:
      - Start with intrigue or surprise
      - Data-backed (cite metrics)
      - Thought-leaderly (position as expert)
      - Engaging (ask questions or provoke thinking)

  instagram:
    hook: "{emoji} {insight_headline}"
    structure:
      - "Hook (surprising statement or question)"
      - "Quick stat (main metric)"
      - "Why it matters"
      - "CTA + hashtags"
    hooks:
      - "{insight}"
      - "Plot twist: {insight}"
      - "Nobody talks about this, but {insight}"
      - "🚨 {insight}"
    example: |
      Plot twist: Luxury hotels don't fail because of price.

      📊 Luxury books 27% less than budget. But here's why...

      Quality expectation gap. Buyers expect 4.30★ and get 4.20★. The letdown is real.

      Full breakdown on my website 🔗 Link in bio
      #dataanalysis #ecommerce #insights

    tone_notes:
      - Start with surprise or intrigue
      - Use emojis (2-4 per post)
      - Shorter sentences
      - Focus on insight over fluff

  twitter:
    structure:
      - "Tweet 1: Hook/statement (intrigue, don't explain)"
      - "Tweets 2-N: Data + insight (build narrative)"
      - "Final tweet: Takeaway + CTA"

    tweet_hooks:
      - "{insight}"
      - "You'd think {common_belief}. Wrong."
      - "The data says: {insight}"
      - "Hot take: {insight}"
      - "{insight} Here's the proof 🧵"

    tweet_1_example: |
      Luxury hotels book 27% less on Expedia. Price isn't why. 🧵

    tweet_middle_example: |
      The real problem: Quality expectation gap.

      Luxury buyers expect 4.30★ hotels.
      They get 4.20★.

      That gap kills conversions.

    tweet_final_example: |
      Fix the quality gap + trust signals = luxury conversion recovers.

      Full analysis: {link}

    tone_notes:
      - Hook first (no setup needed)
      - Punchy, declarative statements
      - Build narrative with data
      - No fluff or apologies

  tiktok:
    structure:
      - "Opening hook (2-3 seconds)"
      - "Finding reveal (3-5 seconds)"
      - "Data visualization (3-5 seconds)"
      - "Takeaway (2-3 seconds)"
      - "CTA (2-3 seconds)"

    opening_hook_examples:
      - "You think {common_belief}? Think again."
      - "Why does {phenomenon} happen? Here's the data."
      - "This statistic shocked me: {metric}"

    tone_notes:
      - Fast-paced, energetic
      - Text overlay is key (people watch muted)
      - Hook in first 2 seconds = stop-scroll moment
      - CTA is subtle (profile link, not direct)

  blog:
    structure:
      - "Bold headline (main insight)"
      - "Subheader (supporting metric)"
      - "Tagline (brief takeaway)"

    example_headline: "{key_insight}: The Data Behind {topic}"
    example_subheader: "{metric} increase when {condition}"
    example_tagline: "Full analysis inside →"

    tone_notes:
      - Headline-focused
      - Minimal text (visuals do the work)
      - Professional tone
      - Clear CTA

# Hashtag Strategies (by project type)
hashtag_strategies:
  data_analysis:
    primary: ["#dataanalysis", "#analytics", "#insights"]
    secondary: ["#research", "#dataviz", "#casestudy"]
    reach: 3-5 hashtags per Instagram post

  product:
    primary: ["#productmanagement", "#startup", "#growth"]
    secondary: ["#innovation", "#design", "#productdevelopment"]
    reach: 3-5 hashtags per Instagram post

  business:
    primary: ["#business", "#strategy", "#entrepreneurship"]
    secondary: ["#economics", "#marketanalysis", "#growth"]
    reach: 3-5 hashtags per Instagram post

# Call-to-Action Variations (use strategically)
cta_variations:
  engagement:
    - "What are your thoughts? Comment below."
    - "Have you experienced this? Let me know in the replies."
    - "Does this match your data? I'd love to hear from you."

  traffic:
    - "Read the full analysis on my website →"
    - "Full case study: {link}"
    - "Detailed breakdown on my website 🔗 Link in bio"

  social_proof:
    - "Share this if you found it useful"
    - "Save this for reference"
    - "Tag someone who should see this"
