<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Expedia Marketplace Analysis — Competitive Positioning Diagnosis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Archivo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ===== jasonkhanani.com Branding ===== */
        :root {
            --rice-paper: #FAF5F0;
            --sumi-ink: #1A1A1A;
            --hanko-rust: #C73E1D;
            --fox-orange: #F07F2E;
            --border-light: rgba(26, 26, 26, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--rice-paper);
            color: var(--sumi-ink);
        }

        body {
            overflow: hidden;
        }

        .presentation-viewport {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        .slide-content {
            flex: 1;
            display: flex;
            overflow: hidden;
            width: 100%;
        }

        .slide {
            width: 100%;
            height: 100%;
            background: var(--rice-paper);
            display: flex;
            flex-direction: column;
            padding: 48px 60px;
            animation: fadeIn 0.4s ease-in-out;
        }

        .slide-inner {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow-y: auto;
            padding-right: 20px;
        }

        .slide-inner::-webkit-scrollbar {
            width: 6px;
        }

        .slide-inner::-webkit-scrollbar-track {
            background: transparent;
        }

        .slide-inner::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 3px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ===== TITLE SLIDE ===== */
        .slide.title-slide {
            justify-content: center;
            padding: 60px;
        }

        .slide.title-slide h1 {
            font-family: 'Archivo', serif;
            font-size: 72px;
            font-weight: 700;
            color: var(--sumi-ink);
            margin-bottom: 20px;
            line-height: 1.1;
            text-align: center;
        }

        .slide.title-slide .subtitle {
            font-size: 32px;
            font-weight: 400;
            color: var(--hanko-rust);
            margin-bottom: 50px;
            text-align: center;
        }

        .slide.title-slide .divider {
            width: 100px;
            height: 3px;
            background: var(--hanko-rust);
            margin: 40px auto;
        }

        .slide.title-slide .meta {
            text-align: center;
            border-top: 1px solid var(--border-light);
            padding-top: 40px;
        }

        .slide.title-slide .meta-item {
            font-size: 14px;
            color: var(--sumi-ink);
            opacity: 0.7;
            margin: 8px 0;
        }

        .slide.title-slide .meta-item a {
            color: var(--hanko-rust);
            text-decoration: none;
            font-weight: 600;
        }

        .slide.title-slide .author {
            font-size: 16px;
            color: var(--sumi-ink);
            font-weight: 600;
            margin-bottom: 50px;
            margin-top: 30px;
        }

        /* ===== CONTENT SLIDES ===== */
        .slide-header {
            margin-bottom: 40px;
        }

        .slide-header h2 {
            font-family: 'Archivo', serif;
            font-size: 48px;
            font-weight: 700;
            color: var(--sumi-ink);
            margin-bottom: 12px;
            border-bottom: 3px solid var(--hanko-rust);
            padding-bottom: 16px;
        }

        .slide-header .subtitle {
            font-size: 16px;
            color: var(--sumi-ink);
            opacity: 0.7;
        }

        /* ===== LAYOUTS ===== */

        /* Single Column */
        .layout-single {
            max-width: 100%;
        }

        /* Two Column Split */
        .layout-two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .layout-two-column .column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Three Card Grid */
        .layout-three-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        /* Full Width Table */
        .table-container {
            width: 100%;
            overflow-x: auto;
            margin: 30px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        table thead {
            background: var(--hanko-rust);
            color: var(--rice-paper);
        }

        table th {
            padding: 16px;
            text-align: left;
            font-weight: 700;
            border: none;
        }

        table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-light);
        }

        table tbody tr:hover {
            background: rgba(199, 62, 29, 0.05);
        }

        table tbody tr:last-child td {
            border-bottom: none;
        }

        /* Content Text */
        .content-text {
            font-size: 16px;
            line-height: 1.8;
            color: var(--sumi-ink);
            opacity: 0.85;
        }

        .content-text p {
            margin-bottom: 16px;
        }

        .content-text strong {
            font-weight: 700;
            color: var(--sumi-ink);
        }

        /* Lists */
        .content-list {
            list-style: none;
            margin: 20px 0;
        }

        .content-list li {
            padding: 12px 0 12px 28px;
            font-size: 15px;
            position: relative;
            color: var(--sumi-ink);
            opacity: 0.85;
            line-height: 1.6;
            border-bottom: 1px solid var(--border-light);
        }

        .content-list li:last-child {
            border-bottom: none;
        }

        .content-list li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--fox-orange);
            font-weight: bold;
        }

        /* Metrics Cards */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .metric-card {
            background: transparent;
            padding: 24px;
            border-left: 4px solid var(--hanko-rust);
            border-radius: 0;
        }

        .metric-card .label {
            font-size: 12px;
            color: var(--sumi-ink);
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .metric-card .value {
            font-size: 36px;
            font-weight: 700;
            color: var(--hanko-rust);
            font-family: 'Archivo', serif;
        }

        /* Highlight Box */
        .highlight-box {
            background: rgba(199, 62, 29, 0.08);
            border-left: 4px solid var(--hanko-rust);
            padding: 24px;
            margin: 30px 0;
            font-size: 16px;
            line-height: 1.7;
            color: var(--sumi-ink);
        }

        .highlight-box strong {
            color: var(--hanko-rust);
            font-weight: 700;
        }

        /* Charts */
        .chart-wrapper {
            position: relative;
            width: 100%;
            height: 350px;
            margin: 30px 0;
        }

        .chart-wrapper canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* Footer */
        .slide-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            border-top: 1px solid var(--border-light);
            background: var(--rice-paper);
            flex-shrink: 0;
            gap: 20px;
        }

        .slide-number {
            font-size: 13px;
            color: var(--sumi-ink);
            opacity: 0.6;
            font-weight: 600;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        button {
            padding: 10px 20px;
            background: var(--hanko-rust);
            color: var(--rice-paper);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: all 0.25s ease;
            text-transform: uppercase;
        }

        button:hover:not(:disabled) {
            background: var(--sumi-ink);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .slide {
                padding: 36px 40px;
            }

            .layout-two-column,
            .layout-three-cards {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            .slide-header h2 {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="presentation-viewport">
        <div class="slide-content">
            <div id="slides-container"></div>
        </div>
        <footer class="slide-footer">
            <span class="slide-number"><span id="current-slide">1</span> / <span id="total-slides">15</span></span>
            <div class="nav-buttons">
                <button id="prev-btn" onclick="previousSlide()">← Previous</button>
                <button id="next-btn" onclick="nextSlide()">Next →</button>
            </div>
        </footer>
    </div>

    <script>
        const slides = [
            {
                id: 1,
                type: 'title',
                title: 'Marketplace Analysis',
                subtitle: 'Competitive Positioning Diagnosis',
                author: 'Jason Kester Hanani',
                meta: [
                    '100,000 sample searches (2012-2013) from Expedia Personalized Sort Challenge',
                    'Sample from full dataset from the following source: <a href="https://www.kaggle.com/competitions/expedia-personalized-sort/overview/description" target="_blank">Kaggle: Expedia Personalized Sort Challenge</a>',
                    'April 18, 2026'
                ]
            },
            {
                id: 2,
                type: 'content',
                layout: 'two-column',
                title: 'The Problem',
                subtitle: 'Luxury segment underperforms dramatically',
                left: {
                    type: 'text',
                    content: `
                        <p><strong>Expedia's booking rate is 2.8% overall</strong>, but varies dramatically by segment:</p>
                        <div class="metrics-grid">
                            <div class="metric-card">
                                <div class="label">Budget</div>
                                <div class="value">3.04%</div>
                            </div>
                            <div class="metric-card">
                                <div class="label">Mid</div>
                                <div class="value">2.89%</div>
                            </div>
                            <div class="metric-card">
                                <div class="label">Luxury</div>
                                <div class="value">2.20%</div>
                            </div>
                        </div>
                        <div class="highlight-box">
                            Luxury is <strong>27% lower</strong> than Budget.<br>Why?
                        </div>
                    `
                },
                right: {
                    type: 'chart',
                    chartType: 'bar',
                    data: {
                        labels: ['Budget', 'Mid', 'Luxury'],
                        datasets: [{
                            label: 'Booking Rate (%)',
                            data: [3.04, 2.89, 2.20],
                            backgroundColor: [
                                'rgba(199, 62, 29, 0.8)',
                                'rgba(199, 62, 29, 0.5)',
                                'rgba(199, 62, 29, 0.3)',
                            ],
                            borderColor: 'var(--hanko-rust)',
                            borderWidth: 0
                        }]
                    }
                }
            },
            {
                id: 3,
                type: 'content',
                layout: 'single',
                title: 'Methodology',
                subtitle: 'Direct measurement of what drives conversions',
                content: `
                    <div class="content-text">
                        <p>Unlike typical marketing analysis, we use <strong>outcome data</strong> to measure what actually drives conversions:</p>
                        <ul class="content-list">
                            <li>Direct measurement of funnel: Impression → Click → Booking</li>
                            <li>Causal analysis enabled by outcome data (click_bool, booking_bool)</li>
                            <li>Statistical comparison of conversion rates across segments</li>
                            <li>Quantified impact of pricing, position, quality, and experience</li>
                            <li>Data-driven prioritization of optimization levers</li>
                        </ul>
                    </div>
                `
            },
            {
                id: 4,
                type: 'content',
                layout: 'two-column',
                title: 'Finding 1: Price is NOT the Lever',
                subtitle: 'Competitiveness = Market Parity (0.0%)',
                left: {
                    type: 'text',
                    content: `
                        <p><strong>Expedia prices at market equilibrium.</strong> Moving from overpriced to underpriced lifts bookings by only 0.83pp.</p>
                        <div class="metrics-grid">
                            <div class="metric-card">
                                <div class="label">Underpriced</div>
                                <div class="value">3.38%</div>
                            </div>
                            <div class="metric-card">
                                <div class="label">At Parity</div>
                                <div class="value">3.01%</div>
                            </div>
                            <div class="metric-card">
                                <div class="label">Overpriced</div>
                                <div class="value">2.55%</div>
                            </div>
                        </div>
                        <div class="highlight-box">
                            Correlation to booking: <strong>+0.0289</strong><br>(negligible)
                        </div>
                    `
                },
                right: {
                    type: 'chart',
                    chartType: 'bar',
                    data: {
                        labels: ['Underpriced', 'At Parity', 'Overpriced'],
                        datasets: [{
                            label: 'Booking Rate (%)',
                            data: [3.38, 3.01, 2.55],
                            backgroundColor: 'rgba(240, 127, 46, 0.7)',
                            borderColor: 'var(--fox-orange)',
                            borderWidth: 0
                        }]
                    }
                }
            },
            {
                id: 5,
                type: 'content',
                layout: 'two-column',
                title: 'Finding 2: Position = Strongest Lever',
                subtitle: 'Position matters 5.22x more for booking',
                left: {
                    type: 'chart',
                    chartType: 'line',
                    data: {
                        labels: ['Pos 1', 'Pos 2', 'Pos 3', 'Pos 4', 'Pos 5', 'Pos 10'],
                        datasets: [{
                            label: 'Booking Rate (%)',
                            data: [13.37, 7.5, 5.8, 4.2, 3.5, 2.56],
                            borderColor: 'var(--hanko-rust)',
                            backgroundColor: 'rgba(199, 62, 29, 0.1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4,
                            pointBackgroundColor: 'var(--hanko-rust)',
                            pointRadius: 6
                        }]
                    }
                },
                right: {
                    type: 'text',
                    content: `
                        <p><strong>Position 1 converts 5.22x better than Position 10.</strong></p>
                        <div class="metrics-grid">
                            <div class="metric-card">
                                <div class="label">Position 1</div>
                                <div class="value">13.37%</div>
                            </div>
                            <div class="metric-card">
                                <div class="label">Position 10</div>
                                <div class="value">2.56%</div>
                            </div>
                            <div class="metric-card">
                                <div class="label">Elasticity</div>
                                <div class="value">5.22x</div>
                            </div>
                        </div>
                        <div class="highlight-box">
                            Position elasticity (5.22x) is <strong>stronger than click elasticity (4.53x)</strong>. Position matters more for booking than for visibility.
                        </div>
                    `
                }
            },
            {
                id: 6,
                type: 'content',
                layout: 'single',
                title: 'Finding 3: Quality Trust Gap = The Root Cause',
                subtitle: 'Luxury buyers see 4.30★ promise but receive 4.20★ delivery',
                content: `
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Segment</th>
                                    <th>Star Rating (Promise)</th>
                                    <th>Review Score (Actual)</th>
                                    <th>Gap</th>
                                    <th>Hotels Beating Promise</th>
                                    <th>Booking Rate</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><strong>Budget</strong></td>
                                    <td>2.40★</td>
                                    <td>3.39</td>
                                    <td><span style="color: var(--fox-orange);">+41%</span></td>
                                    <td>78%</td>
                                    <td><strong>3.04%</strong></td>
                                </tr>
                                <tr>
                                    <td><strong>Mid</strong></td>
                                    <td>3.34★</td>
                                    <td>3.97</td>
                                    <td><span style="color: var(--fox-orange);">+18%</span></td>
                                    <td>73%</td>
                                    <td><strong>2.89%</strong></td>
                                </tr>
                                <tr>
                                    <td><strong>Luxury</strong></td>
                                    <td>4.30★</td>
                                    <td>4.20</td>
                                    <td><span style="color: var(--hanko-rust); font-weight: 700;">-2.3%</span></td>
                                    <td>39%</td>
                                    <td><strong>2.20%</strong></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="highlight-box">
                        Only 39% of luxury hotels beat their promise. 31% fail expectations. Luxury buyers abandon when reality doesn't match the promise.
                    </div>
                `
            },
            {
                id: 7,
                type: 'content',
                layout: 'two-column',
                title: 'Finding 4: Experience Drives Trust',
                subtitle: '1.34x lift for returning visitors',
                left: {
                    type: 'chart',
                    chartType: 'bar',
                    data: {
                        labels: ['New Visitor', 'Returning Visitor'],
                        datasets: [{
                            label: 'Booking Rate (%)',
                            data: [2.74, 3.66],
                            backgroundColor: ['rgba(199, 62, 29, 0.5)', 'rgba(199, 62, 29, 0.9)'],
                            borderColor: 'var(--hanko-rust)',
                            borderWidth: 0
                        }]
                    }
                },
                right: {
                    type: 'text',
                    content: `
                        <p><strong>Returning visitors book 1.34x more than new visitors.</strong></p>
                        <div class="metrics-grid">
                            <div class="metric-card">
                                <div class="label">New Visitor</div>
                                <div class="value">2.74%</div>
                            </div>
                            <div class="metric-card">
                                <div class="label">Returning</div>
                                <div class="value">3.66%</div>
                            </div>
                        </div>
                        <div class="highlight-box">
                            Click rates nearly identical (4.49% vs 4.61%), so visibility is not the differentiator.<br><strong>Trust is.</strong>
                        </div>
                    `
                }
            },
            {
                id: 8,
                type: 'content',
                layout: 'single',
                title: 'Key Finding: Ranking Quality is Equal',
                subtitle: 'The problem is post-click conversion, not visibility',
                content: `
                    <div class="metrics-grid">
                        <div class="metric-card">
                            <div class="label">Budget Click Rate</div>
                            <div class="value">4.6%</div>
                        </div>
                        <div class="metric-card">
                            <div class="label">Mid Click Rate</div>
                            <div class="value">4.7%</div>
                        </div>
                        <div class="metric-card">
                            <div class="label">Luxury Click Rate</div>
                            <div class="value">4.1%</div>
                        </div>
                    </div>
                    <div class="content-text">
                        <p>Click rates are flat across all segments—Expedia's ranking algorithm surfaces relevant hotels equally well. The conversion collapse happens <strong>after the click</strong>.</p>
                        <p style="margin-top: 20px;"><strong>This means:</strong> Ranking quality is NOT the problem. Quality trust and position are.</p>
                    </div>
                `
            },
            {
                id: 9,
                type: 'content',
                layout: 'single',
                title: 'Root Cause: Luxury Quality Gap',
                subtitle: 'Why 27% lower booking rate',
                content: `
                    <div class="content-text">
                        <ul class="content-list">
                            <li><strong>Budget segment:</strong> +41% gap (beats promise) → 78% beat promise → 3.04% booking rate (HIGHEST)</li>
                            <li><strong>Mid segment:</strong> +18% gap (beats promise) → 73% beat promise → 2.89% booking rate</li>
                            <li><strong>Luxury segment:</strong> -2.3% gap (fails promise) → only 39% beat promise → 2.20% booking rate (LOWEST)</li>
                        </ul>
                        <p style="margin-top: 20px;"><strong>The mechanism:</strong> Luxury buyers have elevated expectations. A 4.30★ hotel that delivers 4.20★ feels like a failure, triggering abandonment.</p>
                    </div>
                `
            },
            {
                id: 10,
                type: 'content',
                layout: 'single',
                title: 'Recommendation 1: Fix Luxury Quality Gap',
                subtitle: 'Audit and improve 4.3★-rated hotels',
                content: `

                        <div class="highlight-box">
                            <strong>Expected Impact:</strong> Close -2.3% gap to -1.0% → 0.6pp lift in luxury booking rate
                        </div>
                    </div>
                `
            },
            {
                id: 11,
                type: 'content',
                layout: 'single',
                title: 'Recommendation 2: Reallocate Effort to High-Impact Levers',
                subtitle: 'Stop optimizing price. Start optimizing quality & position.',
                content: `
                    <div class="content-text">
                        <ul class="content-list">
                            <li><strong>Position (5.22x elasticity):</strong> Highest ROI. Improve ranking for conversion signals, not just click relevance.</li>
                            <li><strong>Quality (explains 27% variance):</strong> Fix luxury quality gap; build trust with verified reviews.</li>
                            <li><strong>Experience (1.34x lift):</strong> Highlight returning visitor reviews; show historical booking patterns.</li>
                            <li><strong>Price (+0.0289 correlation):</strong> STOP. Negligible impact. Don't waste resources here.</li>
                        </ul>

            },
            {
                id: 12,
                type: 'content',
                layout: 'single',
                title: 'Implementation Roadmap',
                subtitle: '8-week luxury audit & experimentation plan',
                content: `

                            <li><strong>Phase 2 (Week 3-4):</strong> Investigate root causes; require improvements or delist misaligned properties</li>
                            <li><strong>Phase 3 (Week 5-6):</strong> Launch quality-based ranking experiment; measure booking lift</li>
                            <li><strong>Phase 4 (Week 7-8):</strong> Roll out verified buyer ratings for luxury segment</li>
                        </ul>
                        <div class="highlight-box">
                            <strong>Measurement:</strong> Track luxury booking rate lift from baseline 2.20%
                        </div>
                    </div>
                `
            },
            {
                id: 13,
                type: 'content',
                layout: 'two-column',
                title: 'Success Metrics',
                subtitle: 'Target 5% lift in luxury booking rate',
                left: {
                    type: 'text',
                    content: `

                            <div class="metric-card">
                                <div class="label">Current</div>
                                <div class="value">2.20%</div>

                            <div class="metric-card">

                                <div class="value">2.31%</div>
                            </div>
                            <div class="metric-card">
                                <div class="label">Expected Lift</div>
                                <div class="value">0.6pp</div>
                            </div>
                        </div>
                    `
                },
                right: {
                    type: 'text',
                    content: `
                        <div class="content-text">
                            <p><strong>Primary driver:</strong> Narrow quality gap from -2.3% to -1.0% (0.6pp lift)</p>
                            <p><strong>Secondary driver:</strong> Improved ranking for quality signals (additional 0.3pp lift expected)</p>
                            <p><strong>Measurement period:</strong> 8-week post-implementation monitoring</p>
                            <p><strong>Success threshold:</strong> Achieve 2.28% luxury booking rate (3% lift minimum)</p>
                        </div>
                    `
                }
            },
            {
                id: 14,
                type: 'content',
                layout: 'single',
                title: 'A/B Tests & Validation',
                subtitle: 'Beyond the initial luxury audit',
                content: `
                    <div class="content-text">
                        <ul class="content-list">
                            <li><strong>A/B Test 1:</strong> Show verified buyer ratings vs star ratings → measure booking lift</li>
                            <li><strong>A/B Test 2:</strong> Highlight 'beats traveler expectations' badges → does signaling reduce abandonment?</li>
                            <li><strong>Investigation:</strong> Are star ratings accurate? Analyze photo quality, review recency, maintenance signals</li>
                            <li><strong>Expansion:</strong> Does quality gap exist in Budget/Mid? Investigate if similar fix applies broadly</li>
                            <li><strong>Long-term:</strong> Build predictive model of quality perception using review sentiment, not just star ratings</li>
                        </ul>
                    </div>
                `
            },
            {
                id: 15,
                type: 'content',
                layout: 'single',
                title: 'Summary: Data-Driven Insights',
                subtitle: 'Quantified levers for conversion optimization',
                content: `
                    <div class="content-text">
                        <ul class="content-list">
                            <li><strong>Position (5.22x):</strong> Highest ROI lever for conversion improvement</li>
                            <li><strong>Quality gap (-2.3% luxury):</strong> Root cause of 27% lower luxury booking rate</li>
                            <li><strong>Experience (1.34x):</strong> Trust matters more than visibility for returning visitors</li>
                            <li><strong>Price (+0.0289):</strong> Negligible impact; don't optimize</li>
                            <li><strong>Ranking quality (4-5%):</strong> Equal across segments; problem is post-click conversion</li>
                        </ul>
                        <div class="highlight-box">
                            <strong>Strategic Priority:</strong> Fix luxury quality gap, then optimize position-based ranking, then build trust signals. Ignore price optimization.
                        </div>
                    </div>
                `
            }
        ];

        let currentSlide = 0;
        let chartInstances = [];

        function destroyCharts() {
            chartInstances.forEach(chart => {
                if (chart) chart.destroy();
            });
            chartInstances = [];
        }

        function renderSlide(slideIndex) {
            const slide = slides[slideIndex];
            const container = document.getElementById('slides-container');

            let html = '';

            if (slide.type === 'title') {
                html = `
                    <div class="slide title-slide">
                        <div class="slide-inner">
                            <h1>${slide.title}</h1>
                            <div class="subtitle">${slide.subtitle}</div>
                            <div class="divider"></div>
                            ${slide.author ? `<div class="author">${slide.author}</div>` : ''}
                            <div class="meta">
                                ${slide.meta.map(item => `<div class="meta-item">${item}</div>`).join('')}
                            </div>
                        </div>
                    </div>
                `;
            } else {
                html = `<div class="slide content-slide">
                    <div class="slide-inner">
                        <div class="slide-header">
                            <h2>${slide.title}</h2>
                            ${slide.subtitle ? `<div class="subtitle">${slide.subtitle}</div>` : ''}
                        </div>
                `;

                if (slide.layout === 'two-column') {
                    html += `<div class="layout-two-column">`;

                    if (slide.left) {
                        html += `<div class="column">`;
                        if (slide.left.type === 'text') {
                            html += slide.left.content;
                        } else if (slide.left.type === 'chart') {
                            html += `<div class="chart-wrapper" id="chart-${slideIndex}-left"></div>`;
                        }
                        html += `</div>`;
                    }

                    if (slide.right) {
                        html += `<div class="column">`;
                        if (slide.right.type === 'text') {
                            html += slide.right.content;
                        } else if (slide.right.type === 'chart') {
                            html += `<div class="chart-wrapper" id="chart-${slideIndex}-right"></div>`;
                        }
                        html += `</div>`;
                    }

                    html += `</div>`;
                } else if (slide.layout === 'single') {
                    html += slide.content;
                }

                html += `</div></div>`;
            }

            container.innerHTML = html;
            document.getElementById('current-slide').textContent = slideIndex + 1;
            document.getElementById('total-slides').textContent = slides.length;

            document.getElementById('prev-btn').disabled = slideIndex === 0;
            document.getElementById('next-btn').disabled = slideIndex === slides.length - 1;

            // Render charts
            destroyCharts();
            setTimeout(() => {
                if (slide.layout === 'two-column') {
                    if (slide.left && slide.left.type === 'chart') {
                        renderChart(slideIndex, 'left', slide.left);
                    }
                    if (slide.right && slide.right.type === 'chart') {
                        renderChart(slideIndex, 'right', slide.right);
                    }
                }
            }, 100);
        }

        function renderChart(slideIndex, position, chartConfig) {
            const ctx = document.getElementById(`chart-${slideIndex}-${position}`);
            if (!ctx) return;

            const chart = new Chart(ctx, {
                type: chartConfig.chartType,
                data: chartConfig.data,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 15,
                            grid: {
                                color: 'rgba(26, 26, 26, 0.05)'
                            },
                            ticks: {
                                font: { size: 12 },
                                color: 'rgba(26, 26, 26, 0.6)'
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                font: { size: 12 },
                                color: 'rgba(26, 26, 26, 0.6)'
                            }
                        }
                    }
                }
            });

            chartInstances.push(chart);
        }

        function nextSlide() {
            if (currentSlide < slides.length - 1) {
                currentSlide++;
                renderSlide(currentSlide);
            }
        }

        function previousSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide(currentSlide);
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') previousSlide();
        });

        renderSlide(0);
    </script>
</body>
</html>
