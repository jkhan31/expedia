<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Expedia Marketplace Analysis — Competitive Positioning Diagnosis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Archivo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ===== jasonkhanani.com Branding ===== */
        :root {
            --rice-paper: #FAF5F0;
            --sumi-ink: #1A1A1A;
            --hanko-rust: #C73E1D;
            --fox-orange: #F07F2E;
            --border-light: rgba(26, 26, 26, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--rice-paper);
            color: var(--sumi-ink);
        }

        body {
            overflow: hidden;
        }

        .presentation-viewport {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            padding: 0;
            margin: 0;
        }

        .slide-content {
            flex: 1;
            display: flex;
            overflow: hidden;
            padding: 0;
        }

        .slide {
            width: 100%;
            height: 100%;
            background: var(--rice-paper);
            display: flex;
            flex-direction: column;
            padding: 48px 60px;
            overflow-y: auto;
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .slide::-webkit-scrollbar {
            width: 6px;
        }

        .slide::-webkit-scrollbar-track {
            background: transparent;
        }

        .slide::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 3px;
        }

        .slide::-webkit-scrollbar-thumb:hover {
            background: var(--sumi-ink);
            opacity: 0.3;
        }

        /* ===== SLIDE TYPES ===== */

        /* Title Slide */
        .slide.title-slide {
            justify-content: center;
            align-items: center;
        }

        .slide.title-slide h1 {
            font-family: 'Archivo', serif;
            font-size: 64px;
            font-weight: 700;
            color: var(--sumi-ink);
            margin-bottom: 20px;
            line-height: 1.1;
            text-align: center;
        }

        .slide.title-slide .subtitle {
            font-size: 28px;
            font-weight: 400;
            color: var(--hanko-rust);
            margin-bottom: 40px;
            text-align: center;
        }

        .slide.title-slide .divider {
            width: 80px;
            height: 3px;
            background: var(--hanko-rust);
            border-radius: 2px;
            margin: 30px auto 40px;
        }

        .slide.title-slide .meta {
            text-align: center;
            border-top: 1px solid var(--border-light);
            padding-top: 30px;
            margin-top: 30px;
        }

        .slide.title-slide .meta-item {
            font-size: 14px;
            color: var(--sumi-ink);
            opacity: 0.7;
            margin: 8px 0;
            line-height: 1.5;
        }

        .slide.title-slide .meta-item a {
            color: var(--hanko-rust);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.3s ease;
        }

        .slide.title-slide .meta-item a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* Content Slide */
        .slide.content-slide h2 {
            font-family: 'Archivo', serif;
            font-size: 40px;
            font-weight: 700;
            color: var(--sumi-ink);
            margin-bottom: 30px;
            line-height: 1.2;
            border-bottom: 2px solid var(--hanko-rust);
            padding-bottom: 15px;
        }

        .slide.content-slide .content {
            font-size: 16px;
            line-height: 1.7;
            color: var(--sumi-ink);
            opacity: 0.85;
            margin-bottom: 30px;
        }

        .slide.content-slide .content p {
            margin-bottom: 15px;
        }

        .slide.content-slide .content strong {
            font-weight: 700;
            color: var(--sumi-ink);
            opacity: 1;
        }

        /* Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 25px 0;
        }

        .metric-card {
            background: transparent;
            padding: 20px;
            border-left: 3px solid var(--hanko-rust);
            text-align: left;
        }

        .metric-card .value {
            font-size: 32px;
            font-weight: 700;
            color: var(--hanko-rust);
            margin: 10px 0;
            font-family: 'Archivo', serif;
        }

        .metric-card .label {
            font-size: 12px;
            color: var(--sumi-ink);
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Insights List */
        .insights-list {
            list-style: none;
            margin: 25px 0;
        }

        .insights-list li {
            padding: 12px 0 12px 28px;
            font-size: 15px;
            border-bottom: 1px solid var(--border-light);
            position: relative;
            color: var(--sumi-ink);
            opacity: 0.85;
            line-height: 1.6;
        }

        .insights-list li:last-child {
            border-bottom: none;
        }

        .insights-list li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--fox-orange);
            font-weight: bold;
        }

        /* Highlight Box */
        .highlight-box {
            background: transparent;
            border-left: 4px solid var(--hanko-rust);
            padding: 20px;
            padding-left: 24px;
            margin: 25px 0;
            font-size: 15px;
            line-height: 1.7;
            color: var(--sumi-ink);
            opacity: 0.85;
        }

        .highlight-box strong {
            color: var(--sumi-ink);
            font-weight: 700;
            opacity: 1;
        }

        /* Chart Container */
        .chart-container {
            position: relative;
            width: 100%;
            height: 350px;
            margin: 25px 0;
            background: transparent;
            padding: 0;
            border-radius: 0;
        }

        .chart-container canvas {
            max-height: 350px;
        }

        /* Footer Navigation */
        .slide-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            border-top: 1px solid var(--border-light);
            background: var(--rice-paper);
            flex-shrink: 0;
            height: auto;
            gap: 20px;
        }

        .slide-number {
            font-size: 13px;
            color: var(--sumi-ink);
            opacity: 0.6;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        button {
            padding: 10px 20px;
            background: var(--hanko-rust);
            color: var(--rice-paper);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: all 0.25s ease;
            text-transform: uppercase;
        }

        button:hover:not(:disabled) {
            background: var(--sumi-ink);
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .slide {
                padding: 36px 24px;
            }

            .slide.title-slide h1 {
                font-size: 44px;
            }

            .slide.content-slide h2 {
                font-size: 28px;
            }

            .metrics-grid {
                grid-template-columns: 1fr;
            }

            .slide-footer {
                padding: 16px 24px;
                flex-direction: column-reverse;
                gap: 16px;
            }

            .nav-buttons {
                width: 100%;
            }

            .nav-buttons button {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="presentation-viewport">
        <div class="slide-content">
            <div id="slides-container"></div>
        </div>
        <footer class="slide-footer">
            <span class="slide-number"><span id="current-slide">1</span> / <span id="total-slides">15</span></span>
            <div class="nav-buttons">
                <button id="prev-btn" onclick="previousSlide()">← Previous</button>
                <button id="next-btn" onclick="nextSlide()">Next →</button>
            </div>
        </footer>
    </div>

    <script>
        const presentationData = {
            "slides": [
                {
                    "id": 1,
                    "type": "title",
                    "title": "Marketplace Analysis",
                    "subtitle": "Competitive Positioning Diagnosis",
                    "meta": {
                        "date": "April 18, 2026",
                        "dataset": "100,000 sample searches (2012-2013) from Expedia Personalized Sort Challenge",
                        "note": "Sample from full dataset of millions of rows",
                        "source": "Kaggle: Expedia Personalized Sort Challenge"
                    }
                },
                {
                    "id": 2,
                    "type": "content",
                    "title": "Problem Statement",
                    "content": "<p><strong>Expedia's booking rate is 2.8% of search impressions</strong>—but luxury segment underperforms dramatically.</p><p style='margin-top: 15px;'><strong>Booking Rates by Segment:</strong></p>",
                    "metrics": [
                        { "value": "3.04%", "label": "Budget" },
                        { "value": "2.89%", "label": "Mid" },
                        { "value": "2.20%", "label": "Luxury" }
                    ],
                    "highlight": "Luxury is <strong>27% lower</strong> than Budget. Why?"
                },
                {
                    "id": 3,
                    "type": "content",
                    "title": "Methodology",
                    "content": "<p>Unlike typical marketing analysis, we use <strong>outcome data</strong> to measure what actually drives conversions:</p>",
                    "items": [
                        "Direct measurement of funnel: Impression → Click → Booking",
                        "Causal analysis enabled by outcome data (click_bool, booking_bool)",
                        "Statistical comparison of conversion rates across segments",
                        "Quantified impact of pricing, position, quality, and experience",
                        "Data-driven prioritization of optimization levers"
                    ]
                },
                {
                    "id": 4,
                    "type": "content",
                    "title": "Finding 1: Competitiveness = Market Parity",
                    "content": "<p><strong>Price is NOT the conversion lever.</strong> Expedia is competitively positioned at market equilibrium.</p>",
                    "metrics": [
                        { "value": "0.0%", "label": "Median comp_score" },
                        { "value": "0.83pp", "label": "Underpriced vs Overpriced" },
                        { "value": "+0.0289", "label": "Correlation to booking" }
                    ],
                    "items": [
                        "Underpriced hotels: 3.38% booking rate",
                        "At parity hotels: 3.01% booking rate",
                        "Overpriced hotels: 2.55% booking rate",
                        "Max difference: 0.83pp (negligible absolute impact)"
                    ]
                },
                {
                    "id": 5,
                    "type": "content",
                    "title": "Finding 2: Ranking Quality = Equal",
                    "content": "<p><strong>Expedia's ranking algorithm surfaces relevant hotels equally for all segments.</strong> Click rates are flat across Budget, Mid, and Luxury.</p>",
                    "metrics": [
                        { "value": "4.6%", "label": "Budget click" },
                        { "value": "4.7%", "label": "Mid click" },
                        { "value": "4.1%", "label": "Luxury click" }
                    ],
                    "highlight": "Ranking quality is NOT the problem. The problem is post-click conversion."
                },
                {
                    "id": 6,
                    "type": "content",
                    "title": "Finding 3: Position Elasticity = Strongest Lever",
                    "content": "<p><strong>Position in search results is the single strongest lever for conversion.</strong> Hotels at position 1 convert 5.22x better than position 10.</p>",
                    "metrics": [
                        { "value": "13.37%", "label": "Position 1" },
                        { "value": "2.56%", "label": "Position 10" },
                        { "value": "5.22x", "label": "Elasticity" }
                    ],
                    "items": [
                        "Position elasticity (5.22x) is stronger than click elasticity (4.53x)",
                        "Position matters more for booking than for click",
                        "Improving ranking relevance for conversion, not just click, is key"
                    ]
                },
                {
                    "id": 7,
                    "type": "content",
                    "title": "Finding 4: Quality Trust Gap = The Problem",
                    "content": "<p><strong>Luxury buyers see a 4.30★ promise but receive 4.20★ delivery.</strong> This -2.3% gap triggers abandonment and explains the lowest booking rate.</p>",
                    "metrics": [
                        { "value": "+41%", "label": "Budget gap" },
                        { "value": "+18%", "label": "Mid gap" },
                        { "value": "-2.3%", "label": "Luxury gap" }
                    ],
                    "highlight": "Only 39% of luxury hotels beat their promise. 31% fail. Result: 2.20% booking rate."
                },
                {
                    "id": 8,
                    "type": "content",
                    "title": "Finding 5: Price Correlation = Negligible",
                    "content": "<p>Price optimization has the weakest impact on conversion. Correlation to booking rate is +0.0289—effectively zero.</p>",
                    "items": [
                        "Moving from overpriced to underpriced lifts bookings by only 0.83pp",
                        "This represents ~32% relative improvement, but negligible absolute impact",
                        "Opportunity cost: resources spent on price optimization neglect quality/position",
                        "Strategic implication: Don't optimize price; optimize quality and position"
                    ]
                },
                {
                    "id": 9,
                    "type": "content",
                    "title": "Finding 6: User Experience = 1.34x Lift",
                    "content": "<p><strong>Returning visitors book 1.34x more than new visitors despite identical click rates.</strong> Trust and familiarity matter.</p>",
                    "metrics": [
                        { "value": "2.74%", "label": "New visitor" },
                        { "value": "3.66%", "label": "Returning visitor" },
                        { "value": "1.34x", "label": "Lift" }
                    ],
                    "highlight": "Click rates nearly identical (4.49% vs 4.61%), so visibility is not the differentiator. Trust is."
                },
                {
                    "id": 10,
                    "type": "content",
                    "title": "Root Cause Analysis",
                    "content": "<p><strong>The -2.3% quality gap in Luxury is the primary driver of the 27% lower booking rate.</strong></p>",
                    "items": [
                        "<strong>Budget segment:</strong> +41% gap → 78% beat promise → 3.04% booking rate (highest)",
                        "<strong>Mid segment:</strong> +18% gap → 73% beat promise → 2.89% booking rate",
                        "<strong>Luxury segment:</strong> -2.3% gap → only 39% beat promise → 2.20% booking rate (lowest)",
                        "<strong>Mechanism:</strong> Luxury buyers have elevated expectations. A 4.30★ hotel that delivers 4.20★ feels like a failure."
                    ]
                },
                {
                    "id": 11,
                    "type": "content",
                    "title": "Recommendation 1: Fix Luxury Quality Gap",
                    "content": "<p><strong>Priority:</strong> Audit and improve 4.3★-rated luxury hotels to close the -2.3% gap.</p>",
                    "items": [
                        "<strong>Action 1:</strong> Identify 4.3★ luxury hotels that deliver <4.0★ (promise-delivery gap)",
                        "<strong>Action 2:</strong> Investigate root causes: outdated photos, missing amenities, poor maintenance",
                        "<strong>Action 3:</strong> Remove misaligned listings or require improvement before prominence",
                        "<strong>Action 4:</strong> Prioritize verified buyer ratings to build trust",
                        "<strong>Expected Impact:</strong> Close -2.3% gap to -1.0% → 0.6pp lift in luxury booking rate"
                    ]
                },
                {
                    "id": 12,
                    "type": "content",
                    "title": "Recommendation 2: Prioritize Position & Quality",
                    "content": "<p><strong>Reallocate optimization effort to highest-impact levers:</strong></p>",
                    "items": [
                        "<strong>Position (5.22x elasticity):</strong> Improve ranking for conversion signals, not just click relevance",
                        "<strong>Quality (explains 27% variance):</strong> Fix luxury quality gap; build trust with verified reviews",
                        "<strong>Experience (1.34x lift):</strong> Highlight returning visitor reviews; show historical booking patterns",
                        "<strong>Price correlation +0.0289:</strong> Deprioritize. Don't waste resources here."
                    ]
                },
                {
                    "id": 13,
                    "type": "content",
                    "title": "Implementation: Luxury Audit Roadmap",
                    "content": "<p><strong>Phased approach to maximize impact:</strong></p>",
                    "items": [
                        "<strong>Phase 1 (Week 1-2):</strong> Audit 4.3★+ luxury hotels; flag promise-delivery gaps >0.2★",
                        "<strong>Phase 2 (Week 3-4):</strong> Investigate root causes; require improvements or delist misaligned properties",
                        "<strong>Phase 3 (Week 5-6):</strong> Launch quality-based ranking experiment; measure booking lift",
                        "<strong>Phase 4 (Week 7-8):</strong> Roll out verified buyer ratings for luxury segment",
                        "<strong>Measurement:</strong> Track luxury booking rate lift from baseline 2.20%"
                    ]
                },
                {
                    "id": 14,
                    "type": "content",
                    "title": "Success Metrics: Target 5% Lift",
                    "content": "<p><strong>Success criteria for quality gap fix:</strong></p>",
                    "metrics": [
                        { "value": "2.20%", "label": "Current luxury rate" },
                        { "value": "2.31%", "label": "Target luxury rate" },
                        { "value": "0.6pp", "label": "Expected lift" }
                    ],
                    "items": [
                        "Primary driver: Narrow quality gap from -2.3% to -1.0% (0.6pp lift)",
                        "Secondary driver: Improved ranking for quality signals (additional 0.3pp lift expected)",
                        "Measurement period: 8-week post-implementation monitoring",
                        "Success threshold: Achieve 2.28% luxury booking rate (3% lift minimum)"
                    ]
                },
                {
                    "id": 15,
                    "type": "content",
                    "title": "Next Steps: A/B Tests & Validation",
                    "content": "<p><strong>Beyond the initial luxury audit, invest in understanding quality perception:</strong></p>",
                    "items": [
                        "<strong>A/B Test 1:</strong> Show verified buyer ratings vs star ratings → measure booking lift",
                        "<strong>A/B Test 2:</strong> Highlight 'beats traveler expectations' badges → does signaling reduce abandonment?",
                        "<strong>Investigation:</strong> Are star ratings accurate? Analyze photo quality, review recency, maintenance signals",
                        "<strong>Expansion:</strong> Does quality gap exist in Budget/Mid? Investigate if similar fix applies broadly",
                        "<strong>Long-term:</strong> Build predictive model of quality perception using review sentiment, not just star ratings"
                    ]
                }
            ]
        };

        let currentSlide = 0;

        function renderSlide(slideIndex) {
            const slide = presentationData.slides[slideIndex];
            const container = document.getElementById('slides-container');

            let html = '';

            if (slide.type === 'title') {
                html = `
                    <div class="slide title-slide">
                        <h1>${slide.title}</h1>
                        <div class="subtitle">${slide.subtitle}</div>
                        <div class="divider"></div>
                        <div class="meta">
                            <div class="meta-item"><strong>Dataset:</strong> ${slide.meta.dataset}</div>
                            <div class="meta-item" style="font-style: italic; opacity: 0.6;"><em>${slide.meta.note}</em></div>
                            <div class="meta-item"><strong>Source:</strong> <a href="https://www.kaggle.com/competitions/expedia-personalized-sort/overview/description" target="_blank">${slide.meta.source}</a></div>
                            <div class="meta-item"><strong>Date:</strong> ${slide.meta.date}</div>
                        </div>
                    </div>
                `;
            } else if (slide.type === 'content') {
                html = `<div class="slide content-slide">`;
                html += `<h2>${slide.title}</h2>`;
                html += `<div class="content">${slide.content}`;

                if (slide.metrics) {
                    html += `<div class="metrics-grid">`;
                    slide.metrics.forEach(m => {
                        html += `
                            <div class="metric-card">
                                <div class="label">${m.label}</div>
                                <div class="value">${m.value}</div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }

                if (slide.items) {
                    html += `<ul class="insights-list">`;
                    slide.items.forEach(item => {
                        html += `<li>${item}</li>`;
                    });
                    html += `</ul>`;
                }

                if (slide.highlight) {
                    html += `<div class="highlight-box">${slide.highlight}</div>`;
                }

                html += `</div></div>`;
            }

            container.innerHTML = html;
            document.getElementById('current-slide').textContent = slideIndex + 1;
            document.getElementById('total-slides').textContent = presentationData.slides.length;

            document.getElementById('prev-btn').disabled = slideIndex === 0;
            document.getElementById('next-btn').disabled = slideIndex === presentationData.slides.length - 1;
        }

        function nextSlide() {
            if (currentSlide < presentationData.slides.length - 1) {
                currentSlide++;
                renderSlide(currentSlide);
            }
        }

        function previousSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide(currentSlide);
            }
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') previousSlide();
        });

        // Initial render
        renderSlide(0);
    </script>
</body>
</html>
