<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Expedia Marketplace Analysis — Competitive Positioning Diagnosis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Archivo:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --rice-paper: #FAF5F0;
            --sumi-ink: #1A1A1A;
            --hanko-rust: #C73E1D;
            --fox-orange: #F07F2E;
            --positive-green: #295C27;
            --border-light: rgba(26, 26, 26, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--rice-paper);
            color: var(--sumi-ink);
            overflow: hidden;
        }

        .presentation-viewport {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }

        .slide-content {
            flex: 1;
            display: flex;
            overflow: hidden;
            width: 100%;
            min-height: 0;
        }

        /* Critical: container must fill the flex parent */
        #slides-container {
            width: 100%;
            height: 100%;
            display: flex;
        }

        .slide {
            width: 100%;
            height: 100%;
            background: var(--rice-paper);
            display: flex;
            flex-direction: column;
            padding: 52px 72px 40px;
            overflow-y: auto;
            overflow-x: hidden;
            animation: fadeIn 0.3s ease-in-out;
            flex-shrink: 0;
        }

        /* Title slide: everything centered */
        .slide.title-slide {
            justify-content: center;
            align-items: center;
        }

        /* Content slides: header anchored at top */
        .slide.content-slide {
            justify-content: flex-start;
            align-items: stretch;
        }

        .slide-inner {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 24px;
        }

        .slide.title-slide .slide-inner {
            text-align: center;
            max-width: 860px;
            align-items: center;
            justify-content: center;
            gap: 18px;
        }

        .slide::-webkit-scrollbar { width: 6px; }
        .slide::-webkit-scrollbar-track { background: transparent; }
        .slide::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ===== TITLE SLIDE ===== */
        .slide.title-slide h1 {
            font-family: 'Archivo', serif;
            font-size: 72px;
            font-weight: 700;
            color: var(--sumi-ink);
            line-height: 1.1;
            text-align: center;
        }

        .slide.title-slide .subtitle {
            font-size: 30px;
            font-weight: 400;
            color: var(--hanko-rust);
        }

        .slide.title-slide .divider {
            width: 90px;
            height: 3px;
            background: var(--hanko-rust);
            margin: 10px auto;
        }

        .slide.title-slide .author {
            font-size: 16px;
            color: var(--sumi-ink);
            font-weight: 600;
            opacity: 0.9;
        }

        .slide.title-slide .meta {
            border-top: 1px solid var(--border-light);
            padding-top: 28px;
            width: 100%;
        }

        .slide.title-slide .meta-item {
            font-size: 13px;
            color: var(--sumi-ink);
            opacity: 0.65;
            margin: 7px 0;
            line-height: 1.5;
            text-align: center;
        }

        .slide.title-slide .meta-item a {
            color: var(--hanko-rust);
            text-decoration: none;
            font-weight: 600;
        }

        .slide.title-slide .meta-item a:hover { text-decoration: underline; }

        /* ===== CONTENT SLIDES ===== */
        /* Header is always first, always at same vertical position */
        .slide-header {
            flex-shrink: 0;
        }

        .slide-header h2 {
            font-family: 'Archivo', serif;
            font-size: 44px;
            font-weight: 700;
            color: var(--sumi-ink);
            border-bottom: 3px solid var(--hanko-rust);
            padding-bottom: 10px;
            margin-bottom: 6px;
            line-height: 1.15;
        }

        .slide-header .subtitle {
            font-size: 15px;
            color: var(--sumi-ink);
            opacity: 0.65;
        }

        /* ===== LAYOUTS ===== */
        .layout-two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            align-items: start;
            flex: 1;
            min-height: 0;
        }

        .layout-two-column .column {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .layout-single {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Content */
        .content-text {
            font-size: 16px;
            line-height: 1.8;
            color: var(--sumi-ink);
            opacity: 0.85;
        }

        .content-text p { margin-bottom: 14px; }
        .content-text p:last-child { margin-bottom: 0; }
        .content-text strong { font-weight: 700; color: var(--sumi-ink); opacity: 1; }

        /* Lists */
        .content-list { list-style: none; }

        .content-list li {
            padding: 13px 0 13px 28px;
            font-size: 16px;
            position: relative;
            color: var(--sumi-ink);
            opacity: 0.85;
            line-height: 1.6;
            border-bottom: 1px solid var(--border-light);
        }

        .content-list li:last-child { border-bottom: none; }

        .content-list li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--fox-orange);
            font-weight: bold;
        }

        /* Metric Cards */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 16px;
        }

        .metric-card {
            padding: 18px 16px;
            border-left: 4px solid var(--hanko-rust);
        }

        .metric-card.positive { border-left-color: var(--positive-green); }

        .metric-card .label {
            font-size: 11px;
            color: var(--sumi-ink);
            opacity: 0.55;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 6px;
        }

        .metric-card .value {
            font-size: 30px;
            font-weight: 700;
            color: var(--hanko-rust);
            font-family: 'Archivo', serif;
            line-height: 1;
        }

        .metric-card.positive .value { color: var(--positive-green); }

        /* Highlight Box */
        .highlight-box {
            background: rgba(199, 62, 29, 0.07);
            border-left: 4px solid var(--hanko-rust);
            padding: 18px 20px;
            font-size: 15px;
            line-height: 1.7;
            color: var(--sumi-ink);
        }

        .highlight-box strong { color: var(--hanko-rust); font-weight: 700; }

        /* Tables */
        .table-container { width: 100%; overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }

        table thead { background: var(--hanko-rust); color: var(--rice-paper); }

        table th { padding: 14px 16px; text-align: left; font-weight: 700; }

        table td { padding: 13px 16px; border-bottom: 1px solid var(--border-light); }

        table tbody tr:hover { background: rgba(199, 62, 29, 0.04); }

        table tbody tr:last-child td { border-bottom: none; }

        /* Charts */
        .chart-wrapper {
            position: relative;
            width: 100%;
            height: 360px;
        }

        .chart-wrapper canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* ===== ROOT CAUSE VISUAL ===== */
        .root-cause-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 28px;
            flex: 1;
        }

        .segment-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 32px 20px 28px;
            background: rgba(26, 26, 26, 0.03);
            border-top: 5px solid;
            gap: 10px;
        }

        .segment-card.budget { border-top-color: var(--positive-green); }
        .segment-card.mid { border-top-color: var(--fox-orange); }
        .segment-card.luxury { border-top-color: var(--hanko-rust); }

        .seg-name {
            font-family: 'Archivo', serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--sumi-ink);
            margin-bottom: 4px;
        }

        .seg-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .seg-sub {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            opacity: 0.5;
        }

        .seg-val {
            font-size: 26px;
            font-weight: 700;
            font-family: 'Archivo', serif;
            color: var(--sumi-ink);
            line-height: 1.1;
        }

        .seg-arrow {
            font-size: 44px;
            line-height: 1;
            font-weight: 700;
        }

        .seg-arrow.up { color: var(--positive-green); }
        .seg-arrow.down { color: var(--hanko-rust); }

        .seg-gap {
            font-size: 22px;
            font-weight: 700;
            font-family: 'Archivo', serif;
            padding: 4px 16px;
        }

        .seg-gap.pos {
            color: var(--positive-green);
            background: rgba(41, 92, 39, 0.1);
        }

        .seg-gap.neg {
            color: var(--hanko-rust);
            background: rgba(199, 62, 29, 0.1);
        }

        .seg-divider {
            width: 40px;
            height: 1px;
            background: var(--border-light);
            margin: 4px 0;
        }

        .seg-booking-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            opacity: 0.5;
        }

        .seg-booking-val {
            font-size: 36px;
            font-weight: 700;
            font-family: 'Archivo', serif;
            line-height: 1;
        }

        .seg-booking-val.pos { color: var(--positive-green); }
        .seg-booking-val.neg { color: var(--hanko-rust); }

        /* Footer */
        .slide-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 72px;
            border-top: 1px solid var(--border-light);
            background: var(--rice-paper);
            flex-shrink: 0;
        }

        .slide-number {
            font-size: 12px;
            color: var(--sumi-ink);
            opacity: 0.5;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .nav-buttons { display: flex; gap: 12px; }

        button {
            padding: 9px 20px;
            background: var(--hanko-rust);
            color: var(--rice-paper);
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.4px;
            transition: background 0.2s ease;
            text-transform: uppercase;
        }

        button:hover:not(:disabled) { background: var(--sumi-ink); }
        button:disabled { opacity: 0.35; cursor: not-allowed; }

        @media (max-width: 1024px) {
            .slide { padding: 36px 32px 28px; }
            .layout-two-column { grid-template-columns: 1fr; gap: 32px; }
            .root-cause-grid { grid-template-columns: 1fr; gap: 16px; }
            .slide-header h2 { font-size: 32px; }
            .slide-footer { padding: 14px 32px; flex-direction: column-reverse; gap: 12px; }
            .nav-buttons { width: 100%; }
            .nav-buttons button { flex: 1; }
        }
    </style>
</head>

<body>
    <div class="presentation-viewport">
        <div class="slide-content">
            <div id="slides-container"></div>
        </div>
        <footer class="slide-footer">
            <span class="slide-number"><span id="current-slide">1</span> / <span id="total-slides">15</span></span>
            <div class="nav-buttons">
                <button id="prev-btn" onclick="previousSlide()">← Previous</button>
                <button id="next-btn" onclick="nextSlide()">Next →</button>
            </div>
        </footer>
    </div>

    <script>
        // ── Chart annotation helpers ──────────────────────────────────────────
        function drawDoubleArrow(ctx, x, yTop, yBot, color, label) {
            const h = 7;
            ctx.save();
            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineWidth = 2;

            // shaft
            ctx.beginPath();
            ctx.moveTo(x, yTop + h + 1);
            ctx.lineTo(x, yBot - h - 1);
            ctx.stroke();

            // top arrowhead (points up)
            ctx.beginPath();
            ctx.moveTo(x, yTop);
            ctx.lineTo(x - h / 2, yTop + h);
            ctx.lineTo(x + h / 2, yTop + h);
            ctx.closePath();
            ctx.fill();

            // bottom arrowhead (points down)
            ctx.beginPath();
            ctx.moveTo(x, yBot);
            ctx.lineTo(x - h / 2, yBot - h);
            ctx.lineTo(x + h / 2, yBot - h);
            ctx.closePath();
            ctx.fill();

            if (label) {
                ctx.font = 'bold 13px Inter, sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(label, x + 10, (yTop + yBot) / 2 + 5);
            }
            ctx.restore();
        }

        function drawDashedRef(ctx, x1, y, x2, color) {
            ctx.save();
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5;
            ctx.setLineDash([6, 4]);
            ctx.beginPath();
            ctx.moveTo(x1, y);
            ctx.lineTo(x2, y);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
        }

        // Factory: creates a Chart.js plugin that draws a gap annotation
        function makeGapPlugin(cfg) {
            // cfg: { highVal, lowVal, label, color }
            return {
                id: 'gapAnnotation',
                afterDraw(chart) {
                    const ctx = chart.ctx;
                    const yScale = chart.scales.y;
                    const ca = chart.chartArea;

                    const yHigh = yScale.getPixelForValue(cfg.highVal);
                    const yLow = yScale.getPixelForValue(cfg.lowVal);

                    // Dashed reference line at highVal across full chart area
                    drawDashedRef(ctx, ca.left, yHigh, ca.right, cfg.color);

                    // Double arrow on the right side inside chart area
                    const arrowX = ca.right - 36;
                    drawDoubleArrow(ctx, arrowX, yHigh, yLow, cfg.color, cfg.label);
                }
            };
        }

                            </div>
                            <div class="metric-card">
                                <div class="label">Luxury</div>
                                <div class="value">2.20%</div>
                            </div>
                        </div>
                        <div class="highlight-box">
                            Luxury is <strong>27% lower</strong> than Budget.<br>Why?
                        </div>
                    `
                },
                right: {
                    type: 'chart',

                    data: {
                        labels: ['Budget', 'Mid', 'Luxury'],
                        datasets: [{
                            label: 'Booking Rate (%)',
                            data: [3.04, 2.89, 2.20],
                            backgroundColor: [
                                'rgba(199, 62, 29, 0.85)',
                                'rgba(199, 62, 29, 0.55)',
                                'rgba(199, 62, 29, 0.28)'
                            ],
                            borderWidth: 0
                        }]
                    },
                    yAxisMax: 5,
                    gapAnnotation: { highVal: 3.04, lowVal: 2.20, label: 'Δ27%', color: '#F07F2E' }
                }

            {

        // ── Renderer ──────────────────────────────────────────────────────────
        let currentSlide = 0;
        let chartInstances = {};

        function destroyCharts() {
            Object.values(chartInstances).forEach(c => c && c.destroy());
            chartInstances = {};
        }

        function renderRootCause() {
            return `
                <div class="root-cause-grid">
                    <div class="segment-card budget">
                        <div class="seg-name">Budget</div>
                        <div class="seg-row">
                            <span class="seg-sub">Promise</span>
                            <span class="seg-val">2.40★</span>
                        </div>
                        <div class="seg-arrow up">↑</div>
                        <div class="seg-gap pos">+41% gap</div>
                        <div class="seg-row">
                            <span class="seg-sub">Delivers</span>
                            <span class="seg-val">3.39 rating</span>
                        </div>
                        <div class="seg-divider"></div>
                        <div class="seg-booking-label">Booking Rate</div>
                        <div class="seg-booking-val pos">3.04%</div>
                    </div>
                    <div class="segment-card mid">
                        <div class="seg-name">Mid</div>
                        <div class="seg-row">
                            <span class="seg-sub">Promise</span>
                            <span class="seg-val">3.34★</span>
                        </div>
                        <div class="seg-arrow up">↑</div>
                        <div class="seg-gap pos">+18% gap</div>
                        <div class="seg-row">
                            <span class="seg-sub">Delivers</span>
                            <span class="seg-val">3.97 rating</span>
                        </div>
                        <div class="seg-divider"></div>
                        <div class="seg-booking-label">Booking Rate</div>
                        <div class="seg-booking-val pos">2.89%</div>
                    </div>
                    <div class="segment-card luxury">
                        <div class="seg-name">Luxury</div>
                        <div class="seg-row">
                            <span class="seg-sub">Promise</span>
                            <span class="seg-val">4.30★</span>
                        </div>
                        <div class="seg-arrow down">↓</div>
                        <div class="seg-gap neg">−2.3% gap</div>
                        <div class="seg-row">
                            <span class="seg-sub">Delivers</span>
                            <span class="seg-val">4.20 rating</span>
                        </div>
                        <div class="seg-divider"></div>
                        <div class="seg-booking-label">Booking Rate</div>
                        <div class="seg-booking-val neg">2.20%</div>
                    </div>
                </div>
            `;
        }

        function renderSlide(slideIndex) {
            destroyCharts();
            const slide = slides[slideIndex];
            const container = document.getElementById('slides-container');
            let html = '';

            if (slide.type === 'title') {
                html = `
                    <div class="slide title-slide">
                        <div class="slide-inner">
                            <h1>${slide.title}</h1>
                            <div class="subtitle">${slide.subtitle}</div>
                            <div class="divider"></div>
                            ${slide.author ? `<div class="author">${slide.author}</div>` : ''}
                            <div class="meta">
                                ${slide.meta.map(m => `<div class="meta-item">${m}</div>`).join('')}
                            </div>
                        </div>
                    </div>
                `;
            } else {
                let body = '';

                if (slide.layout === 'two-column') {
                    body = `<div class="layout-two-column">`;
                    body += `<div class="column">`;
                    if (slide.left.type === 'text') body += slide.left.content;
                    else body += `<div class="chart-wrapper" id="chart-${slideIndex}-left"></div>`;
                    body += `</div>`;
                    body += `<div class="column">`;
                    if (slide.right.type === 'text') body += slide.right.content;
                    else body += `<div class="chart-wrapper" id="chart-${slideIndex}-right"></div>`;
                    body += `</div></div>`;

                } else if (slide.layout === 'rootcause') {
                    body = renderRootCause();

                } else {
                    body = `<div class="layout-single">${slide.content}</div>`;
                }

                html = `
                    <div class="slide content-slide">
                        <div class="slide-inner">
                            <div class="slide-header">
                                <h2>${slide.title}</h2>
                                ${slide.subtitle ? `<div class="subtitle">${slide.subtitle}</div>` : ''}
                            </div>
                            ${body}
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;
            document.getElementById('current-slide').textContent = slideIndex + 1;
            document.getElementById('total-slides').textContent = slides.length;
            document.getElementById('prev-btn').disabled = slideIndex === 0;
            document.getElementById('next-btn').disabled = slideIndex === slides.length - 1;

            // Render charts after DOM settles
            setTimeout(() => {
                if (slide.layout === 'two-column') {
                    if (slide.left && slide.left.type === 'chart')
                        renderChart(slideIndex, 'left', slide.left);
                    if (slide.right && slide.right.type === 'chart')
                        renderChart(slideIndex, 'right', slide.right);
                }
            }, 50);
        }

        function renderChart(slideIndex, position, chartConfig) {
            const id = `chart-${slideIndex}-${position}`;
            const wrapper = document.getElementById(id);
            if (!wrapper) return;

            let canvas = wrapper.querySelector('canvas');
            if (!canvas) {
                canvas = document.createElement('canvas');
                wrapper.appendChild(canvas);
            }

            const ctx = canvas.getContext('2d');
            const yMax = chartConfig.yAxisMax || 15;

            const plugins = [];
            if (chartConfig.gapAnnotation) {
                plugins.push(makeGapPlugin(chartConfig.gapAnnotation));
            }

            const chart = new Chart(ctx, {
                type: chartConfig.chartType,
                data: chartConfig.data,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: {
                        padding: { right: 60 }
                    },
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: yMax,
                            grid: {
                                color: 'rgba(26, 26, 26, 0.05)',
                                drawBorder: false
                            },
                            ticks: {
                                font: { size: 11, family: 'Inter' },
                                color: 'rgba(26, 26, 26, 0.55)',
                                padding: 8
                            }
                        },
                        x: {
                            grid: { display: false, drawBorder: false },
                            ticks: {
                                font: { size: 11, family: 'Inter' },
                                color: 'rgba(26, 26, 26, 0.55)',
                                padding: 8
                            }
                        }
                    }
                },
                plugins: plugins
            });

            chartInstances[id] = chart;
        }

        function nextSlide() {
            if (currentSlide < slides.length - 1) {
                currentSlide++;
                renderSlide(currentSlide);
            }
        }

        function previousSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide(currentSlide);
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') previousSlide();
        });

        renderSlide(0);
    </script>
